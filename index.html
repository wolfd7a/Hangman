<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Prince of the Lost Tower</title>
<style>
  html,body{margin:0;padding:0;background:#0b0806;color:#e8e0d0;font-family:Georgia,'Times New Roman',serif;height:100%;}
  body{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
  #wrap{position:relative;width:min(96vw,960px);}
  canvas{display:block;width:100%;image-rendering:pixelated;background:#141009;border:2px solid #3a2d1e;border-radius:4px;box-shadow:0 0 60px rgba(0,0,0,.8);}
  #hint{font-size:13px;color:#8a7a60;text-align:center;letter-spacing:.5px;}
  h1{font-size:18px;letter-spacing:6px;color:#c9a86a;font-weight:normal;margin:8px 0 0;text-transform:uppercase;}
</style>
</head>
<body>
<h1>Prince of the Lost Tower</h1>
<div id="wrap"><canvas id="game" width="960" height="540"></canvas></div>
<div id="hint">&#8592;&#8594; run &nbsp;&middot;&nbsp; Shift walk (safe past spikes) &nbsp;&middot;&nbsp; &#8593;/Space jump &amp; climb &nbsp;&middot;&nbsp; &#8595; drop / pull lever &nbsp;&middot;&nbsp; X attack &nbsp;&middot;&nbsp; Z parry</div>
<script src="game.js"></script>
</body>
</html>
